<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crownline Construction</title>
    <script>
      (function() {
        try {
          var _fetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return _fetch; },
            set: function(v) { 
              console.warn('Prevented attempt to overwrite window.fetch');
            },
            configurable: true
          });
        } catch (e) {
          console.error('Failed to define fetch proxy:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
